name: claude-nightly-cleaner
# Runner versions pinned; see ci.yaml header comment for rationale.

# Nightly code quality sweep — resolves merge conflicts on bot PRs, reviews all
# commits merged to main in the past 24 hours for bugs, inconsistencies, and
# improvement opportunities, closes open issues resolved by recent merges, and
# performs a rolling survey of existing code/docs (full repo every 28 days).
on:
  schedule:
    # Run at 6:17 AM UTC daily (off-peak minute)
    - cron: '17 6 * * *'
  workflow_dispatch:

# Consistent with ci.yaml for cache compatibility
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  cleaner:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          # Use bot token so pushed commits trigger CI workflows
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 🔧 Setup build tools
        uses: ./.github/actions/claude-setup

      - name: 🤖 Run Claude Code for nightly cleanup
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          bot_id: "254187624"
          bot_name: "worktrunk-bot"
          additional_permissions: |
            actions: read

          prompt: nightly-cleaner

          claude_args: |
            --model opus
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill
            --append-system-prompt "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."

      - name: 📋 Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
