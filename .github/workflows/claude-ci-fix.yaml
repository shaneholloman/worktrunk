name: claude-ci-fix
# Runner versions pinned; see ci.yaml header comment for rationale.

# Trigger when CI or docs workflow fails on main
on:
  workflow_run:
    workflows: [ci, publish-docs]
    types: [completed]
    branches: [main]

# Consistent with ci.yaml for cache compatibility
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  fix-ci:
    # Only run when CI failed on main
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          # Use bot token so pushed commits trigger CI workflows
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 🔧 Setup build tools
        uses: ./.github/actions/claude-setup

      - name: 🤖 Run Claude Code to fix CI
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use bot token so pushed commits trigger CI workflows
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          bot_id: "254187624"
          bot_name: "worktrunk-bot"
          additional_permissions: |
            actions: read

          prompt: |
            fix-ci ${{ github.event.workflow_run.id }}
            - Run URL: ${{ github.event.workflow_run.html_url }}
            - Commit: ${{ github.event.workflow_run.head_sha }}
            - Commit message: ${{ github.event.workflow_run.head_commit.message }}

          claude_args: |
            --model opus
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill
            --append-system-prompt "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."

      - name: 📋 Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
